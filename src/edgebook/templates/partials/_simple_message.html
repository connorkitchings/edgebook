{% if level == 'success' %}
<div style="padding: 0.5rem 0.75rem; background: rgba(34, 197, 94, 0.1); border: 1px solid var(--success); border-radius: 0.375rem; color: var(--success); font-size: 0.75rem;">
    {{ message }}
</div>
{% else %}
<div style="padding: 0.5rem 0.75rem; background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); border-radius: 0.375rem; color: var(--danger); font-size: 0.75rem;">
    {{ message }}
</div>
{% endif %}
