{% if level == 'success' %}
<div class="alert alert-success">
    <button type="button" class="alert-close" aria-label="Dismiss" onclick="this.parentElement.remove()">&times;</button>
    {{ message }}
</div>
{% else %}
<div class="alert alert-error">
    <button type="button" class="alert-close" aria-label="Dismiss" onclick="this.parentElement.remove()">&times;</button>
    {{ message }}
</div>
{% endif %}
