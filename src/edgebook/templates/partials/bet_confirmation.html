<div id="bet-confirmation-section">
    <div class="card-header" style="margin-bottom: 1rem;">
        <h3 style="color: var(--success);">Bet Placed</h3>
    </div>

    <div style="padding: 1rem; border: 1px solid var(--border); border-radius: 0.5rem; margin-bottom: 1.5rem;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; font-size: 0.875rem;">
            <div><span style="color: var(--text-muted);">Selection:</span> <strong>{{ bet.selection.value }}</strong></div>
            <div><span style="color: var(--text-muted);">Odds:</span> <strong>{{ bet.american_odds }}</strong></div>
            <div><span style="color: var(--text-muted);">Market:</span> {{ bet.market_type.value }}</div>
            <div><span style="color: var(--text-muted);">Stake:</span> <strong>${{ bet.stake }}</strong></div>
            <div><span style="color: var(--text-muted);">Status:</span>
                <span class="badge badge-info">{{ bet.status.value }}</span>
            </div>
            <div><span style="color: var(--text-muted);">Balance:</span> <strong>${{ current_balance }}</strong></div>
        </div>
    </div>

    <div style="display: flex; gap: 0.5rem;">
        <button class="btn btn-primary"
                hx-get="/partials/game-select"
                hx-target="#wizard-step"
                hx-swap="innerHTML">
            Place Another
        </button>
        <a href="/" class="btn btn-secondary">Dashboard</a>
    </div>
</div>
