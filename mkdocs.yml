site_name: Edgebook
site_description: A simulation-only college football paper-betting platform.

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy

nav:
  - 'Home': 'index.md'
  - 'Getting Started': 'getting_started.md'
  - 'Project Overview':
    - 'Project Brief': 'project_brief.md'
    - 'Project Charter': 'project_charter.md'
    - 'Implementation Schedule': 'implementation_schedule.md'
  - 'Development':
    - 'Development Standards': 'development_standards.md'
    - 'Checklists': 'checklists.md'
    - 'Troubleshooting': 'troubleshooting.md'
  - 'Architecture':
    - 'System Overview': 'architecture/system_overview.md'
    - 'Data Modeling': 'architecture/data_modeling.md'
    - 'Initial Architecture (ADR)': 'architecture/adr/adr-0001-initial-architecture.md'
  - 'Operations':
    - 'Runbook': 'runbook.md'
    - 'Security & Responsible Use': 'security.md'
    - 'Knowledge Base': 'knowledge_base.md'
  - 'API':
    - 'Reference': 'api/README.md'
  - 'Reference':
    - 'AI Guide': 'ai_guide.md'
    - 'AI Session Templates': 'ai_session_templates.md'

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_root_heading: true
            show_source: true
