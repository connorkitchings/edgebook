openapi: 3.0.0
info:
  title: Edgebook API
  description: >-
    Simulation-only college football paper-betting platform API. All balances and
    odds are fictional simulation data. There is no real-money payment, wagering,
    or sportsbook integration.
  version: 0.1.0
servers:
  - url: http://127.0.0.1:8000
    description: Local development server
paths:
  /health:
    get:
      summary: Health check
      description: Verifies that the API and configured database are reachable.
      responses:
        '200':
          description: API and database are healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /accounts:
    post:
      summary: Create a fictional account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [owner_name]
              properties:
                owner_name:
                  type: string
                  maxLength: 200
                starting_bankroll:
                  type: number
                  format: float
                  minimum: 0
                  description: Two-decimal simulation credits.
      responses:
        '201':
          description: Account created with opening bankroll posting.
        '422':
          description: Invalid request payload.
  /accounts/{account_id}:
    get:
      summary: Retrieve account status and balance
      parameters:
        - in: path
          name: account_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Account status, opening bankroll, and current balance.
        '404':
          description: Account not found.
  /accounts/{account_id}/transactions:
    post:
      summary: Record a DEPOSIT or WITHDRAWAL
      parameters:
        - in: path
          name: account_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [transaction_type, amount]
              properties:
                transaction_type:
                  type: string
                  enum: [DEPOSIT, WITHDRAWAL]
                amount:
                  type: number
                  format: float
                  description: Positive two-decimal simulation credits.
                description:
                  type: string
      responses:
        '201':
          description: Transaction posted; balance updated.
        '404':
          description: Account not found.
  /accounts/{account_id}/reconcile:
    post:
      summary: Verify account balance integrity
      description: >-
        Checks that the materialized current balance matches the sum of all
        ledger postings. Returns discrepancy if any drift is detected.
      parameters:
        - in: path
          name: account_id
          required: true
          schema: {type: string}
      responses:
        '200': {description: Reconciliation result with balance status.}
        '404': {description: Account not found.}
  /accounts/{account_id}/bets:
    post:
      summary: Place a straight simulated bet
      description: Locks the quote and line and debits a fictional WAGER_STAKE posting.
      parameters:
        - in: path
          name: account_id
          required: true
          schema: {type: string}
        - in: header
          name: Idempotency-Key
          required: false
          schema: {type: string, maxLength: 100}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [market_id, selection, stake]
              properties:
                market_id: {type: string}
                selection: {type: string, enum: [HOME, AWAY, OVER, UNDER]}
                stake: {type: number, format: decimal, minimum: 0.01}
                reason: {type: string, maxLength: 500, nullable: true}
      responses:
        '201': {description: Bet placed or idempotent retry returned.}
        '404': {description: Account or market not found.}
        '409': {description: Inactive account, insufficient balance, closed market, or cutoff reached.}
        '422': {description: Invalid stake or selection.}
    get:
      summary: Read newest-first simulated bet history
      parameters:
        - in: path
          name: account_id
          required: true
          schema: {type: string}
        - in: query
          name: limit
          schema: {type: integer, minimum: 1, maximum: 100, default: 50}
        - in: query
          name: offset
          schema: {type: integer, minimum: 0, default: 0}
      responses:
        '200': {description: Paginated bet history with locked placement terms and results.}
        '404': {description: Account not found.}
  /accounts/{account_id}/bets/{bet_id}:
    get:
      summary: Retrieve one simulated bet owned by the account
      parameters:
        - in: path
          name: account_id
          required: true
          schema: {type: string}
        - in: path
          name: bet_id
          required: true
          schema: {type: string}
      responses:
        '200': {description: Bet placement snapshot and settlement result.}
        '404': {description: Account or bet not found.}
  /accounts/{account_id}/bets/{bet_id}/review:
    get:
      summary: Read the asynchronous human rationale review
      responses:
        '200': {description: Review lifecycle state and completed findings.}
        '404': {description: Account, bet, or review not found.}
    put:
      summary: Complete a local human rationale review
      description: Authentication is required before this local-only endpoint is externally exposed.
      responses:
        '200': {description: Completed review with bias flags.}
        '409': {description: Review is already terminal.}
  /accounts/{account_id}/transactions:
    get:
      summary: Read a newest-first statement
      parameters:
        - in: path
          name: account_id
          required: true
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: Paginated transaction statement.
        '404':
          description: Account not found.
  /accounts/{account_id}/analytics:
    get:
      summary: Retrieve comprehensive performance analytics
      description: >-
        Returns ROI, win rate, Sharpe ratio, drawdown, balance series,
        and breakdowns by sport, market type, and rationale category.
      parameters:
        - in: path
          name: account_id
          required: true
          schema: {type: string}
        - in: query
          name: from
          schema: {type: string, format: date-time}
          description: Optional timezone-aware start of date range. Chart series begin at the balance immediately before this instant.
        - in: query
          name: to
          schema: {type: string, format: date-time}
          description: Optional timezone-aware end of date range; must not precede `from`.
        - in: query
          name: buckets
          schema: {type: string}
          description: Comma-separated positive, strictly increasing conviction bucket boundaries (e.g., "1,2,5,10,25").
      responses:
        '200': {description: Comprehensive analytics with summary, breakdowns, and chart series.}
        '404': {description: Account not found.}
        '422': {description: Invalid date range, timezone, or bucket boundaries.}
  /cfb/teams:
    post:
      summary: Add a reusable team catalog entry
      responses:
        '201':
          description: Team created.
        '409':
          description: Duplicate team.
  /cfb/games:
    post:
      summary: Create a scheduled game between distinct teams
      responses:
        '201':
          description: Game created.
        '404':
          description: Team dependency not found.
        '422':
          description: Invalid request payload.
  /cfb/games/{game_id}:
    get:
      summary: Retrieve the game, markets, and quotes
      parameters:
        - in: path
          name: game_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Game with nested markets and quotes.
        '404':
          description: Game not found.
  /cfb/games/{game_id}/markets:
    post:
      summary: Create a draft SPREAD, MONEYLINE, or TOTAL market
      responses:
        '201':
          description: Draft market created.
        '409':
          description: Duplicate market for this game and type.
  /cfb/games/{game_id}/result:
    put:
      summary: Finalize a score and settle all pending bets
      parameters:
        - in: path
          name: game_id
          required: true
          schema: {type: string}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [home_score, away_score]
              properties:
                home_score: {type: integer, minimum: 0}
                away_score: {type: integer, minimum: 0}
      responses:
        '200': {description: Final game; an identical retry is idempotent.}
        '404': {description: Game not found.}
        '409': {description: A different score was already finalized.}
        '422': {description: Invalid score.}
  /cfb/games/{game_id}/quote-comparison:
    get:
      summary: Compare provider quote observations without a canonical line
      responses:
        '200': {description: Best and worst quote IDs by market and selection.}
        '404': {description: Game not found.}
  /cfb/games/{game_id}/correction:
    put:
      summary: Correct a finalized score and re-settle bets
      description: >-
        Reverses prior payouts via offsetting ADJUSTMENT entries, re-settles
        all bets with corrected scores, and records an audit-trail entry.
        Authentication and authorization are required before this local simulation endpoint is externally exposed.
      parameters:
        - in: path
          name: game_id
          required: true
          schema: {type: string}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [home_score, away_score, reason]
              properties:
                home_score: {type: integer, minimum: 0}
                away_score: {type: integer, minimum: 0}
                reason: {type: string, maxLength: 1000}
      responses:
        '200': {description: Corrected game with re-settled bets.}
        '404': {description: Game not found.}
        '409': {description: Game is not finalized.}
        '422': {description: Scores unchanged or reason missing.}
  /cfb/games/{game_id}/resolve-score-conflict:
    put:
      summary: Resolve a held provider-score conflict and settle the game
      description: Local operator workflow; authentication is required before external exposure.
      responses:
        '200': {description: Resolved final game with settlement applied.}
        '409': {description: Game is not in a conflicted scheduled state.}
  /cfb/markets/{market_id}/quotes:
    post:
      summary: Add a selection and signed American odds quote
      description: >-
        A market opens once it has its required pair of quotes. Provider observations are retained separately by source.
      responses:
        '201':
          description: Quote added.
        '409':
          description: Duplicate quote for this market and selection.
        '422':
          description: Invalid odds or inappropriate market line.
