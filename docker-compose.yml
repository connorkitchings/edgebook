services:
  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    environment:
      - DATABASE_URL=postgresql://edgebook:edgebook@db:5432/edgebook
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql://edgebook:edgebook@db:5432/edgebook
      - ENV=production
      - DEBUG=false
      - ODDS_API_KEY=${ODDS_API_KEY:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json, urllib.request; assert json.load(urllib.request.urlopen('http://127.0.0.1:8000/health'))['status'] == 'ok'",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=edgebook
      - POSTGRES_PASSWORD=edgebook
      - POSTGRES_DB=edgebook
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edgebook"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
